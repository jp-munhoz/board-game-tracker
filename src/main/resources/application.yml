spring:
  application:
    name: board-game-tracker
  datasource:
    url: jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.aynplvzxchiweomeapcy
    password: tabuleiroamigos
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jmx:
    enabled: false

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 20
      min-spare: 2
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      cookie:
        same-site: lax
        http-only: true

ludopedia:
  base-url: https://ludopedia.com.br/api/v1
